name: GitHub Release (reusable)

# ---------------------------------------------------------------------------
# Reusable workflow: create a GitHub Release with optional assets
#
# Usage:
#   jobs:
#     release:
#       uses: ITlusions/ITL.Github/.github/workflows/_reusable-release-gh.yml@main
#       with:
#         tag: "v1.2.3"
#         artifact-name: "myproject-wheel"
#       secrets:
#         gh-pat: ${{ secrets.GH_PAT }}
# ---------------------------------------------------------------------------
on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag, e.g. v1.2.3"
        required: true
        type: string
      artifact-name:
        description: "Name of the artifact to download as release asset"
        required: false
        type: string
        default: ""
      artifact-run-id:
        description: "Run ID of the workflow that produced the artifact (empty = current run)"
        required: false
        type: string
        default: ""
      generate-release-notes:
        description: "Auto-generate release notes from commits"
        required: false
        type: boolean
        default: true
      body:
        description: "Optional release body text (markdown)"
        required: false
        type: string
        default: ""

    secrets:
      gh-pat:
        description: "PAT for creating the release (required so release:published fires downstream)"
        required: false

    outputs:
      release-url:
        description: "URL of the created GitHub Release"
        value: ${{ jobs.release.outputs.release-url }}

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release-url: ${{ steps.create-release.outputs.url }}

    permissions:
      contents: write
      actions: read

    steps:
      - name: Detect release type
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if echo "$VERSION" | grep -qE '-(alpha|beta|rc)\.';
          then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Download artifact
        if: inputs.artifact-name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          run-id: ${{ inputs.artifact-run-id || '' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist/
        continue-on-error: true

      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "${{ inputs.tag }}"
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: ${{ inputs.generate-release-notes }}
          body: ${{ inputs.body }}
          files: ${{ inputs.artifact-name != '' && 'dist/*' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.gh-pat || secrets.GITHUB_TOKEN }}
